name: groster

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: groster-bot
    restart: unless-stopped
    ports:
      - "${GROSTER_PORT:-5000}:5000"
    env_file:
      - .env
    environment:
      GROSTER_DATA_PATH: "${GROSTER_DATA_PATH:-/app/data}"
      GROSTER_LOG_DIR: "${GROSTER_LOG_DIR:-/app/logs}"
      GROSTER_LOG_FORMAT: "${GROSTER_LOG_FORMAT:-json}"
    volumes:
      - groster-data:${GROSTER_DATA_PATH:-/app/data}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import socket; s=socket.create_connection(('localhost',5000),2); s.close()",
        ]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"

volumes:
  groster-data:
    driver: local
